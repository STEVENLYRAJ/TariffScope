<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>TariffScope - Analyzer</title>
<link rel="stylesheet" href="https://unpkg.com/leaflet/dist/leaflet.css" />
<script src="https://unpkg.com/leaflet/dist/leaflet.js"></script>
<script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
<script src="https://cdn.jsdelivr.net/npm/chartjs-plugin-datalabels@2"></script>
<script src="https://unpkg.com/react@18/umd/react.development.js"></script>
<script src="https://unpkg.com/react-dom@18/umd/react-dom.development.js"></script>

<style>

body {
  margin: 0;
  font-family: 'Inter', sans-serif;
  background: radial-gradient(circle at top, #0f172a, #020617);
  color: white;
  display: flex;
}

.sidebar {
  width: 230px;
  height: 100vh;
  padding: 20px;
  background: rgba(255,255,255,0.05);
  backdrop-filter: blur(15px);
  border-right: 1px solid rgba(255,255,255,0.1);
}

.sidebar h2 {
  color: #00e5ff;
  text-shadow: 0 0 10px #00e5ff;
}

.sidebar a {
  display: block;
  margin: 18px 0;
  color: #aaa;
  text-decoration: none;
  transition: 0.3s;
}

.sidebar a:hover, .sidebar a.active {
  color: #00e5ff;
  transform: translateX(5px);
}

.main {
  flex: 1;
  padding: 30px;
}

.card {
  padding: 20px;
  border-radius: 16px;
  background: rgba(255,255,255,0.05);
  backdrop-filter: blur(12px);
  border: 1px solid rgba(255,255,255,0.1);
  transition: 0.3s;
}

.card:hover {
  transform: translateY(-5px);
  box-shadow: 0 0 20px rgba(0,229,255,0.3);
}

.card h3 {
  color: #00e5ff;
}

.chart-box {
  margin-top: 20px;
  padding: 15px;
  border-radius: 16px;
  background: rgba(255,255,255,0.04);
  backdrop-filter: blur(10px);
}

.flex {
  display: flex;
  gap: 20px;
  margin-top: 20px;
}

.controls {
  width: 260px;
  padding: 20px;
  border-radius: 16px;
  background: rgba(255,255,255,0.05);
  backdrop-filter: blur(10px);
}

input, select {
  width: 100%;
  margin-top: 10px;
  padding: 10px;
  border-radius: 8px;
  border: none;
  background: #020617;
  color: white;
}

button {
  width: 100%;
  margin-top: 15px;
  padding: 12px;
  border-radius: 10px;
  border: none;
  background: linear-gradient(90deg, #00e5ff, #00ff9c);
  cursor: pointer;
  font-weight: bold;
  transition: 0.3s;
}

button:hover {
  transform: scale(1.05);
  box-shadow: 0 0 15px #00e5ff;
}

.risk {
  font-size: 32px;
  margin-top: 20px;
  font-weight: bold;
}

.fade-in {
  animation: fade 1s ease-in;
}

@keyframes fade {
  from { opacity: 0; transform: translateY(10px); }
  to { opacity: 1; transform: translateY(0); }
}

.loading {
  display: inline-block;
  width: 20px;
  height: 20px;
  border: 3px solid rgba(0, 229, 255, 0.3);
  border-radius: 50%;
  border-top-color: #00e5ff;
  animation: spin 1s linear infinite;
}

@keyframes spin {
  to { transform: rotate(360deg); }
}

.loading-overlay {
  position: fixed;
  top: 0;
  left: 0;
  right: 0;
  bottom: 0;
  background: rgba(0, 0, 0, 0.8);
  display: flex;
  justify-content: center;
  align-items: center;
  z-index: 9999;
}

.loading-content {
  text-align: center;
}

.loading-content p {
  margin-top: 20px;
  color: #00e5ff;
  font-weight: bold;
}

</style>
</head>

<body>

<div class="sidebar">
  <h2>TariffScope</h2>
  <a href="index.html">Dashboard</a>
  <a href="analyzer.html" class="active">Analyzer</a>
  <a href="simulation.html">Simulation</a>
  <a href="map.html">Map</a>
  <a href="insights.html">Insights</a>
</div>

<div class="main fade-in">

  <h1>Tariff Analyzer</h1>

  <div class="flex">
    <div class="controls">
      <label>Country</label>
      <select id="countrySelect">
        <option>India</option>
        <option>China</option>
        <option>United Kingdom</option>
        <option>Russia</option>
        <option>Japan</option>
        <option>Australia</option>
      </select>

      <label>Sector</label>
      <select id="sectorSelect">
        <option>Electronics</option>
        <option>Steel</option>
        <option>Agriculture</option>
        <option>Pharmaceuticals</option>
      </select>

      <label>Tariff (%)</label>
      <input type="range" id="tariffSlider" min="0" max="25" value="10" />

      <button onclick="analyzeTariff()">Analyze Impact</button>
    </div>

    <div style="flex:1;">
      <div class="chart-box">
        <canvas id="sectorChart"></canvas>
      </div>
      <div class="risk" id="riskDisplay" style="color:#ff4d4d;">Risk Score: 78</div>
    </div>
  </div>

  <div class="card" style="margin-top: 30px;">
    <h3>Analysis Results</h3>
    <div id="analysisResults">
      <p>Select parameters and click "Analyze Impact" to see detailed tariff analysis.</p>
    </div>
  </div>

</div>

<script>
// Loading Animation
function showLoadingOverlay(duration = 2000) {
  const overlay = document.createElement('div');
  overlay.className = 'loading-overlay';
  overlay.innerHTML = '<div class="loading-content"><div class="loading"></div><p>Analyzing Data...</p></div>';
  document.body.appendChild(overlay);
  setTimeout(() => overlay.remove(), duration);
}

// Charts with Tooltips
const chartOptions = {
  responsive: true,
  plugins: {
    legend: { labels: { color: '#aaa' } },
    tooltip: {
      backgroundColor: 'rgba(0, 229, 255, 0.9)',
      titleColor: '#fff',
      bodyColor: '#fff',
      borderColor: '#00e5ff',
      borderWidth: 2,
      padding: 15,
      displayColors: true,
      callbacks: {
        afterLabel: function(context) {
          return '→ Click for details';
        }
      }
    }
  },
  scales: {
    y: { ticks: { color: '#aaa' }, grid: { color: 'rgba(255,255,255,0.1)' } },
    x: { ticks: { color: '#aaa' }, grid: { color: 'rgba(255,255,255,0.1)' } }
  }
};

let sectorChart = new Chart(document.getElementById("sectorChart"), {
  type: "bar",
  data: {
    labels: ["Steel","Tech","Agriculture","Pharma"],
    datasets: [{
      label: "Risk Score by Sector",
      data: [40,80,30,65],
      backgroundColor: ["#ff4d4d","#ffd700","#00ff9c","#00e5ff"],
      borderRadius: 8,
      hoverBackgroundColor: ["#ff6666","#ffed4e","#33ffb3","#33f2ff"]
    }]
  },
  options: {
    ...chartOptions,
    scales: {
      y: {
        ...chartOptions.scales.y,
        beginAtZero: true,
        max: 100
      },
      x: chartOptions.scales.x
    }
  }
});

function analyzeTariff() {
  showLoadingOverlay(1500);

  const country = document.getElementById('countrySelect').value;
  const sector = document.getElementById('sectorSelect').value;
  const tariff = document.getElementById('tariffSlider').value;

  // Update risk display
  const riskScore = Math.floor(Math.random() * 40) + 40; // Random risk between 40-80
  document.getElementById('riskDisplay').textContent = `Risk Score: ${riskScore}`;
  document.getElementById('riskDisplay').style.color = riskScore > 70 ? '#ff4d4d' : riskScore > 50 ? '#ffd700' : '#00ff9c';

  // Update chart data
  const newData = [
    Math.floor(Math.random() * 60) + 20,
    Math.floor(Math.random() * 60) + 20,
    Math.floor(Math.random() * 60) + 20,
    Math.floor(Math.random() * 60) + 20
  ];

  sectorChart.data.datasets[0].data = newData;
  sectorChart.update();

  // Update analysis results
  document.getElementById('analysisResults').innerHTML = `
    <h4>Analysis for ${country} - ${sector} Sector</h4>
    <p><strong>Tariff Rate:</strong> ${tariff}%</p>
    <p><strong>Risk Assessment:</strong> ${riskScore > 70 ? 'High' : riskScore > 50 ? 'Medium' : 'Low'}</p>
    <p><strong>Impact Estimate:</strong> $${(tariff * 1000000).toLocaleString()} in potential losses</p>
    <p><strong>Recommendation:</strong> ${riskScore > 70 ? 'Consider alternative suppliers' : 'Monitor closely'}</p>
  `;
}

</script>

</body>
</html>
