<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>TariffScope Premium</title>
<link rel="stylesheet" href="https://unpkg.com/leaflet/dist/leaflet.css" />
<script src="https://unpkg.com/leaflet/dist/leaflet.js"></script>
<script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
<script src="https://cdn.jsdelivr.net/npm/chartjs-plugin-datalabels@2"></script>
<script src="https://unpkg.com/react@18/umd/react.development.js"></script>
<script src="https://unpkg.com/react-dom@18/umd/react-dom.development.js"></script>

<style>

body {
  margin: 0;
  font-family: 'Inter', sans-serif;
  background: radial-gradient(circle at top, #0f172a, #020617);
  color: white;
  display: flex;
}

.sidebar {
  width: 230px;
  height: 100vh;
  padding: 20px;
  background: rgba(255,255,255,0.05);
  backdrop-filter: blur(15px);
  border-right: 1px solid rgba(255,255,255,0.1);
}

.sidebar h2 {
  color: #00e5ff;
  text-shadow: 0 0 10px #00e5ff;
}

.sidebar a {
  display: block;
  margin: 18px 0;
  color: #aaa;
  text-decoration: none;
  transition: 0.3s;
}

.sidebar a:hover {
  color: #00e5ff;
  transform: translateX(5px);
}

.main {
  flex: 1;
  padding: 30px;
}

.cards {
  display: flex;
  gap: 20px;
}

.card {
  flex: 1;
  padding: 20px;
  border-radius: 16px;
  background: rgba(255,255,255,0.05);
  backdrop-filter: blur(12px);
  border: 1px solid rgba(255,255,255,0.1);
  transition: 0.3s;
}

.card:hover {
  transform: translateY(-5px);
  box-shadow: 0 0 20px rgba(0,229,255,0.3);
}

.card h3 {
  color: #00e5ff;
}

.chart-box {
  margin-top: 20px;
  padding: 15px;
  border-radius: 16px;
  background: rgba(255,255,255,0.04);
  backdrop-filter: blur(10px);
}

.flex {
  display: flex;
  gap: 20px;
  margin-top: 20px;
}

.controls {
  width: 260px;
  padding: 20px;
  border-radius: 16px;
  background: rgba(255,255,255,0.05);
  backdrop-filter: blur(10px);
}

input, select {
  width: 100%;
  margin-top: 10px;
  padding: 10px;
  border-radius: 8px;
  border: none;
  background: #020617;
  color: white;
}

button {
  width: 100%;
  margin-top: 15px;
  padding: 12px;
  border-radius: 10px;
  border: none;
  background: linear-gradient(90deg, #00e5ff, #00ff9c);
  cursor: pointer;
  font-weight: bold;
  transition: 0.3s;
}

button:hover {
  transform: scale(1.05);
  box-shadow: 0 0 15px #00e5ff;
}

.risk {
  font-size: 32px;
  margin-top: 20px;
  font-weight: bold;
}

.fade-in {
  animation: fade 1s ease-in;
}

@keyframes fade {
  from { opacity: 0; transform: translateY(10px); }
  to { opacity: 1; transform: translateY(0); }
}

.loading {
  display: inline-block;
  width: 20px;
  height: 20px;
  border: 3px solid rgba(0, 229, 255, 0.3);
  border-radius: 50%;
  border-top-color: #00e5ff;
  animation: spin 1s linear infinite;
}

@keyframes spin {
  to { transform: rotate(360deg); }
}

.loading-overlay {
  position: fixed;
  top: 0;
  left: 0;
  right: 0;
  bottom: 0;
  background: rgba(0, 0, 0, 0.8);
  display: flex;
  justify-content: center;
  align-items: center;
  z-index: 9999;
}

.loading-content {
  text-align: center;
}

.loading-content p {
  margin-top: 20px;
  color: #00e5ff;
  font-weight: bold;
}

#map {
  height: 500px;
  border-radius: 16px;
  border: 1px solid rgba(255,255,255,0.1);
  margin-top: 20px;
}

.counter-value {
  font-size: 36px;
  font-weight: bold;
  color: #00e5ff;
}

</style>
</head>

<body>

<div class="sidebar">
  <h2>TariffScope</h2>
  <a href="index.html" class="active">Dashboard</a>
  <a href="analyzer.html">Analyzer</a>
  <a href="simulation.html">Simulation</a>
  <a href="map.html">Map</a>
  <a href="insights.html">Insights</a>
</div>

<div class="main fade-in">

  <h1>GeoTrade Intelligence</h1>

  <div class="cards">
    <div class="card">
      <h3>Global Exposure Index</h3>
      <p class="counter-value" data-target="72">0</p>
    </div>

    <div class="card">
      <h3>Most Affected</h3>
      <p>China</p>
    </div>

    <div class="card">
      <h3>Highest Risk Sector</h3>
      <p>Electronics</p>
    </div>
  </div>

  <div class="chart-box">
    <canvas id="tradeChart"></canvas>
  </div>

  <div class="chart-box">
    <canvas id="oilChart"></canvas>
  </div>

</div>

<script>
// Loading Animation
function showLoadingOverlay(duration = 2000) {
  const overlay = document.createElement('div');
  overlay.className = 'loading-overlay';
  overlay.innerHTML = '<div class="loading-content"><div class="loading"></div><p>Loading Dashboard...</p></div>';
  document.body.appendChild(overlay);
  setTimeout(() => overlay.remove(), duration);
}

// Animated Counter
function animateCounter(element, target, duration = 2000) {
  const increment = target / (duration / 16);
  let current = 0;

  const timer = setInterval(() => {
    current += increment;
    if (current >= target) {
      element.textContent = Math.round(target);
      clearInterval(timer);
    } else {
      element.textContent = Math.round(current);
    }
  }, 16);
}

// Initialize counters when page loads
window.addEventListener('load', () => {
  const counters = document.querySelectorAll('[data-target]');
  counters.forEach(counter => {
    const target = parseInt(counter.getAttribute('data-target'));
    animateCounter(counter, target);
  });
  showLoadingOverlay(1500);
});

// Charts with Tooltips
const chartOptions = {
  responsive: true,
  plugins: {
    legend: { labels: { color: '#aaa' } },
    tooltip: {
      backgroundColor: 'rgba(0, 229, 255, 0.9)',
      titleColor: '#fff',
      bodyColor: '#fff',
      borderColor: '#00e5ff',
      borderWidth: 2,
      padding: 15,
      displayColors: true,
      callbacks: {
        afterLabel: function(context) {
          return '→ Click for details';
        }
      }
    }
  },
  scales: {
    y: { ticks: { color: '#aaa' }, grid: { color: 'rgba(255,255,255,0.1)' } },
    x: { ticks: { color: '#aaa' }, grid: { color: 'rgba(255,255,255,0.1)' } }
  }
};

new Chart(document.getElementById("tradeChart"), {
  type: "line",
  data: {
    labels: ["2019","2020","2021","2022"],
    datasets: [{
      label: "Trade Volume (Billions USD)",
      data: [100,80,120,90],
      borderColor: "#00e5ff",
      backgroundColor: "rgba(0, 229, 255, 0.1)",
      tension: 0.4,
      fill: true,
      pointRadius: 6,
      pointBackgroundColor: "#00e5ff",
      pointBorderColor: "#fff",
      pointBorderWidth: 2,
      pointHoverRadius: 8
    }]
  },
  options: chartOptions
});

new Chart(document.getElementById("oilChart"), {
  type: "line",
  data: {
    labels: ["Jan","Feb","Mar","Apr"],
    datasets: [{
      label: "Oil Price (USD/barrel)",
      data: [70,75,90,85],
      borderColor: "#00ff9c",
      backgroundColor: "rgba(0, 255, 156, 0.1)",
      tension: 0.4,
      fill: true,
      pointRadius: 6,
      pointBackgroundColor: "#00ff9c",
      pointBorderColor: "#fff",
      pointBorderWidth: 2,
      pointHoverRadius: 8
    }]
  },
  options: chartOptions
});

</script>

</body>
</html>
