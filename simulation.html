<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>TariffScope - Simulation</title>
<link rel="stylesheet" href="https://unpkg.com/leaflet/dist/leaflet.css" />
<script src="https://unpkg.com/leaflet/dist/leaflet.js"></script>
<script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
<script src="https://cdn.jsdelivr.net/npm/chartjs-plugin-datalabels@2"></script>
<script src="https://unpkg.com/react@18/umd/react.development.js"></script>
<script src="https://unpkg.com/react-dom@18/umd/react-dom.development.js"></script>

<style>

body {
  margin: 0;
  font-family: 'Inter', sans-serif;
  background: radial-gradient(circle at top, #0f172a, #020617);
  color: white;
  display: flex;
}

.sidebar {
  width: 230px;
  height: 100vh;
  padding: 20px;
  background: rgba(255,255,255,0.05);
  backdrop-filter: blur(15px);
  border-right: 1px solid rgba(255,255,255,0.1);
}

.sidebar h2 {
  color: #00e5ff;
  text-shadow: 0 0 10px #00e5ff;
}

.sidebar a {
  display: block;
  margin: 18px 0;
  color: #aaa;
  text-decoration: none;
  transition: 0.3s;
}

.sidebar a:hover, .sidebar a.active {
  color: #00e5ff;
  transform: translateX(5px);
}

.main {
  flex: 1;
  padding: 30px;
}

.card {
  padding: 20px;
  border-radius: 16px;
  background: rgba(255,255,255,0.05);
  backdrop-filter: blur(12px);
  border: 1px solid rgba(255,255,255,0.1);
  transition: 0.3s;
}

.card:hover {
  transform: translateY(-5px);
  box-shadow: 0 0 20px rgba(0,229,255,0.3);
}

.card h3 {
  color: #00e5ff;
}

input, select {
  width: 100%;
  margin-top: 10px;
  padding: 10px;
  border-radius: 8px;
  border: none;
  background: #020617;
  color: white;
}

button {
  width: 100%;
  margin-top: 15px;
  padding: 12px;
  border-radius: 10px;
  border: none;
  background: linear-gradient(90deg, #00e5ff, #00ff9c);
  cursor: pointer;
  font-weight: bold;
  transition: 0.3s;
}

button:hover {
  transform: scale(1.05);
  box-shadow: 0 0 15px #00e5ff;
}

.fade-in {
  animation: fade 1s ease-in;
}

@keyframes fade {
  from { opacity: 0; transform: translateY(10px); }
  to { opacity: 1; transform: translateY(0); }
}

.loading {
  display: inline-block;
  width: 20px;
  height: 20px;
  border: 3px solid rgba(0, 229, 255, 0.3);
  border-radius: 50%;
  border-top-color: #00e5ff;
  animation: spin 1s linear infinite;
}

@keyframes spin {
  to { transform: rotate(360deg); }
}

.loading-overlay {
  position: fixed;
  top: 0;
  left: 0;
  right: 0;
  bottom: 0;
  background: rgba(0, 0, 0, 0.8);
  display: flex;
  justify-content: center;
  align-items: center;
  z-index: 9999;
}

.loading-content {
  text-align: center;
}

.loading-content p {
  margin-top: 20px;
  color: #00e5ff;
  font-weight: bold;
}

.simulation-grid {
  display: grid;
  grid-template-columns: 1fr 1fr;
  gap: 20px;
  margin-top: 20px;
}

</style>
</head>

<body>

<div class="sidebar">
  <h2>TariffScope</h2>
  <a href="index.html">Dashboard</a>
  <a href="analyzer.html">Analyzer</a>
  <a href="simulation.html" class="active">Simulation</a>
  <a href="map.html">Map</a>
  <a href="insights.html">Insights</a>
</div>

<div class="main fade-in">

  <h1>Simulation Lab</h1>

  <div class="simulation-grid">
    <div id="react-root-1"></div>
    <div id="react-root-2"></div>
    <div id="react-root-3"></div>
    <div id="react-root-4"></div>
  </div>

</div>

<script>
// Loading Animation
function showLoadingOverlay(duration = 2000) {
  const overlay = document.createElement('div');
  overlay.className = 'loading-overlay';
  overlay.innerHTML = '<div class="loading-content"><div class="loading"></div><p>Running Simulation...</p></div>';
  document.body.appendChild(overlay);
  setTimeout(() => overlay.remove(), duration);
}

// React Simulation Components
const e = React.createElement;

function TariffSimulation({ country, initialTariff = 10 }) {
  const [tariff, setTariff] = React.useState(initialTariff);
  const [countryState, setCountry] = React.useState(country);
  const price = (tariff * 1.5).toFixed(1);

  const handleCountryChange = (e) => {
    setCountry(e.target.value);
    showLoadingOverlay(1000);
  };

  const handleTariffChange = (e) => {
    setTariff(e.target.value);
  };

  return e("div", { className: "card fade-in" },
    e("h3", null, `${countryState} Tariff Simulation`),
    e("label", null, "Country:"),
    e("select", {
      value: countryState,
      onChange: handleCountryChange,
      style: { marginBottom: "15px" }
    }, [
      e("option", { key: "India", value: "India" }, "India"),
      e("option", { key: "China", value: "China" }, "China"),
      e("option", { key: "UK", value: "UK" }, "United Kingdom"),
      e("option", { key: "Russia", value: "Russia" }, "Russia"),
      e("option", { key: "Japan", value: "Japan" }, "Japan"),
      e("option", { key: "Australia", value: "Australia" }, "Australia")
    ]),
    e("label", null, "Adjust Tariff:"),
    e("input", {
      type: "range",
      min: 0,
      max: 25,
      value: tariff,
      onChange: handleTariffChange,
      style: { width: "100%", marginTop: "10px" }
    }),
    e("p", null, "Tariff: " + tariff + "%"),
    e("p", null, "Price Increase: " + price + "%"),
    e("p", null, "Primary Importers: China, India, Japan"),
    e("p", { style: { color: tariff > 15 ? "#ff4d4d" : tariff > 10 ? "#ffd700" : "#00ff9c", fontWeight: "bold" } },
      "Risk Level: " + (tariff > 15 ? "CRITICAL" : tariff > 10 ? "HIGH" : "MODERATE")
    )
  );
}

// Render multiple simulation instances
ReactDOM.createRoot(document.getElementById("react-root-1")).render(e(TariffSimulation, { country: "China" }));
ReactDOM.createRoot(document.getElementById("react-root-2")).render(e(TariffSimulation, { country: "India", initialTariff: 15 }));
ReactDOM.createRoot(document.getElementById("react-root-3")).render(e(TariffSimulation, { country: "United Kingdom", initialTariff: 8 }));
ReactDOM.createRoot(document.getElementById("react-root-4")).render(e(TariffSimulation, { country: "Japan", initialTariff: 12 }));

</script>

</body>
</html>
